<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
        }
        h1 {
            margin-bottom: 20px;
            color: #333;
        }
        .prediction {
            font-size: 22px;
            font-weight: bold;
            color: #007BFF;
            margin: 10px 0;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background: #007BFF;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .label {
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Traffic Time Prediction</h1>

        <div class="label">Predicted Departure Time</div>
        <div class="prediction" id="departure">--:--</div>

        <div class="label">Predicted Arrival Time</div>
        <div class="prediction" id="arrival">--:--</div>

        <button onclick="showPrediction()">Show Prediction</button>
    </div>

    <script>
        function showPrediction() {
            // Example static values
            const departureTime = "08:45";
            const arrivalTime = "09:30";

            document.getElementById("departure").innerText = departureTime;
            document.getElementById("arrival").innerText = arrivalTime;
        }
    </script>
</body>
</html>
